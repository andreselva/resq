services:
  db:
    image: mysql:8.0
    container_name: mysql-db-resq-api
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: resq
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3310:3306"
    networks:
      - backend-network

  backend:
    container_name: resq-api
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run start:dev
    environment:
      - NODE_ENV=development
      - PORT=8001
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=railway
      - JWT_SECRET=samantinha
      - JWT_REFRESH_SECRET=samantinha
    depends_on:
      db:
        condition: service_started
    networks:
      - backend-network
    ports:
      - "8001:8001"
    volumes:
      - ./:/app
      - backend_node_modules:/app/node_modules

      
networks:
  backend-network:
    driver: bridge

volumes:
  mysql-data:
  backend_node_modules:
  